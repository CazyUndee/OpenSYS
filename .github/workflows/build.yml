name: Build OpenSYS OS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc nasm qemu-system-x86 xorriso grub-pc-bin mtools xxd

      - name: Assemble boot
        run: |
          mkdir -p obj bin
          nasm -f elf64 boot/boot64.asm -o obj/boot.o
          nasm -f elf64 boot/interrupts64.asm -o obj/interrupts.o
          nasm -f elf64 boot/context_switch.asm -o obj/context_switch.o
          nasm -f elf64 boot/syscall.asm -o obj/syscall_asm.o

      - name: Build user program
        run: |
          cd user
          make clean || true
          make init.elf init.bin 2>/dev/null || echo "User binary skipped"
          cd ..

      - name: Compile kernel
        run: |
          for src in kernel64 pmm64 paging64 kheap64 vga io usb hid_keyboard shell ps2_keyboard idt64 ramfs timer process scheduler switch_to vm tss gdt64 syscall elf fs gpt disk pic interrupt_handlers user_bin; do
            if [ -f "src/${src}.c" ]; then
              gcc -m64 -c "src/${src}.c" -o "obj/${src}.o" \
                -ffreestanding -O0 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin \
                -Iinclude -mcmodel=large
            fi
          done

      - name: Link kernel
        run: ld -m elf_x86_64 -T linker/linker64.ld -nostdlib -o bin/kernel64.bin obj/*.o

      - name: Show kernel
        run: |
          ls -la bin/kernel64.bin
          file bin/kernel64.bin

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernel-bin
          path: bin/kernel64.bin

      - name: Create ISO
        run: |
          mkdir -p iso/boot/grub
          cp bin/kernel64.bin iso/boot/kernel
          cat > iso/boot/grub/grub.cfg << 'EOFGRUB'
          set timeout=0
          set default=0
          menuentry "OpenSYS OS" {
              multiboot /boot/kernel
              boot
          }
          EOFGRUB
          grub-mkrescue -o bin/os.iso iso 2>&1 || echo "ISO creation may have failed"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: os-iso
          path: bin/os.iso

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download kernel
        uses: actions/download-artifact@v4
        with:
          name: kernel-bin
          path: bin

      - name: Test boot
        run: |
          timeout 5s qemu-system-x86_64 -kernel bin/kernel64.bin -nographic -m 128 -no-reboot 2>&1 || true
          file bin/kernel64.bin