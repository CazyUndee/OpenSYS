name: Build OpenCode OS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y gcc-multilib nasm qemu-system-x86 xorriso grub-pc-bin
    
    - name: Build kernel
      run: |
        # Create directories
        mkdir -p obj bin
        
        # Compile boot
        echo "Compiling boot_c.c"
        gcc -m32 -c boot/boot_c.c -o obj/boot.o \
          -ffreestanding -O2 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin -Iinclude
        
        # Assemble interrupt stubs
        echo "Assembling interrupts.asm"
        nasm -f elf32 boot/interrupts.asm -o obj/interrupts.o
        
        # Compile all source files
        for src in src/*.c; do
          name=$(basename "$src" .c)
          echo "Compiling $src"
          gcc -m32 -c "$src" -o "obj/${name}.o" \
            -ffreestanding -O2 -Wall -Wextra -fno-exceptions -nostdlib -fno-builtin -Iinclude
        done
        
        # Link
        echo "Linking kernel.bin"
        ld -m elf_i386 -T linker/linker.ld -nostdlib -o bin/kernel.bin obj/*.o
        
        echo "========================================"
        echo "Build complete!"
        echo "========================================"
        ls -la bin/kernel.bin
        file bin/kernel.bin
        
    - name: Upload kernel binary
      uses: actions/upload-artifact@v4
      with:
        name: kernel-bin
        path: bin/kernel.bin
        
    - name: Create bootable ISO
      run: |
        mkdir -p iso/boot/grub
        cp bin/kernel.bin iso/boot/kernel
        
        cat > iso/boot/grub/grub.cfg << 'EOF'
        set timeout=0
        set default=0

        menuentry "OpenCode OS" {
          multiboot /boot/kernel
        }
        EOF
        
        grub-mkrescue -o bin/os.iso iso 2>/dev/null || echo "Note: ISO creation skipped (grub-mkrescue not available)"
        
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: os-iso
        path: bin/os.iso
        if-no-files-found: warn
        
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Install QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-system-x86
    
    - name: Download kernel artifact
      uses: actions/download-artifact@v4
      with:
        name: kernel-bin
        path: bin
        
    - name: Test in QEMU (verify boot)
      run: |
        # Run QEMU and capture output
        echo "Testing kernel boot..."
        timeout 10s qemu-system-i386 -kernel bin/kernel.bin \
          -display none -serial stdio \
          -m 128 -no-reboot 2>&1 | tee qemu_output.txt || true
        
        echo "========================================"
        echo "QEMU output:"
        cat qemu_output.txt
        echo "========================================"
        
        # Check for expected strings
        if grep -q "OpenCode OS" qemu_output.txt; then
          echo "SUCCESS: Kernel booted successfully!"
          exit 0
        else
          echo "FAIL: Expected output not found"
          echo "Checking kernel binary..."
          file bin/kernel.bin || true
          exit 1
        fi
